<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>trend-engine</title>
  <style>
    :root { --bg:#0f1216; --card:#181d24; --muted:#8b97a7; --fg:#e7ecf2;
            --accent:#4f9dff; --green:#39b981; --red:#e5534b; --amber:#e0a13b;
            --border:#252c36; }
    * { box-sizing:border-box; }
    body { margin:0; background:var(--bg); color:var(--fg);
           font:15px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif; }
    a { color:var(--accent); text-decoration:none; }
    header { display:flex; align-items:center; gap:16px; padding:14px 24px;
             border-bottom:1px solid var(--border); background:var(--card); position:sticky; top:0; }
    header h1 { font-size:16px; margin:0; letter-spacing:.3px; }
    header .niche { color:var(--muted); font-size:13px; }
    nav { margin-left:auto; display:flex; gap:14px; align-items:center; }
    .wrap { max-width:1000px; margin:0 auto; padding:24px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:12px;
            padding:18px; margin-bottom:16px; }
    .row { display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
    .muted { color:var(--muted); }
    .pill { font-size:12px; padding:2px 9px; border-radius:999px; border:1px solid var(--border); }
    .pill.pending { color:var(--amber); border-color:var(--amber); }
    .pill.approved { color:var(--green); border-color:var(--green); }
    .pill.rejected { color:var(--red); border-color:var(--red); }
    .pill.posted { color:var(--accent); border-color:var(--accent); }
    .score { font-variant-numeric:tabular-nums; font-weight:600; }
    button, .btn { font:inherit; cursor:pointer; border-radius:8px; padding:8px 14px;
            border:1px solid var(--border); background:#222a33; color:var(--fg); }
    button.primary { background:var(--accent); border-color:var(--accent); color:#04121f; font-weight:600; }
    button.good { background:var(--green); border-color:var(--green); color:#04140d; font-weight:600; }
    button.bad { background:transparent; border-color:var(--red); color:var(--red); }
    button.warn { background:var(--amber); border-color:var(--amber); color:#1a1204; font-weight:600; }
    textarea, input { width:100%; background:#0f141a; color:var(--fg); border:1px solid var(--border);
            border-radius:8px; padding:10px; font:inherit; }
    textarea { min-height:150px; resize:vertical; }
    label { display:block; font-size:13px; color:var(--muted); margin:12px 0 4px; }
    table { width:100%; border-collapse:collapse; }
    th, td { text-align:left; padding:8px; border-bottom:1px solid var(--border); font-size:14px; }
    .grid2 { display:grid; grid-template-columns:1fr 1fr; gap:12px; }
    .flash { background:#12321f; border:1px solid var(--green); color:#a6e9c7;
             padding:10px 14px; border-radius:8px; margin-bottom:16px; }
    .banner-kill { background:#3a1512; border:1px solid var(--red); color:#f2b3ae;
             padding:10px 14px; border-radius:8px; margin-bottom:16px; }
    code { background:#0f141a; padding:2px 6px; border-radius:6px; font-size:13px; }
    .hashtags { color:var(--accent); font-size:13px; }
    /* --- insights --- */
    .kpis { display:grid; grid-template-columns:repeat(auto-fit,minmax(120px,1fr)); gap:12px; }
    .kpi { background:#0f141a; border:1px solid var(--border); border-radius:10px; padding:12px 14px; }
    .kpi .n { font-size:22px; font-weight:700; font-variant-numeric:tabular-nums; }
    .kpi .l { font-size:12px; color:var(--muted); margin-top:2px; }
    .barrow { display:grid; grid-template-columns:130px 1fr 68px; align-items:center; gap:10px; margin:7px 0; }
    .barrow .k { font-size:13px; color:var(--fg); overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
    .barrow .v { font-size:12px; color:var(--muted); text-align:right; font-variant-numeric:tabular-nums; }
    .track { background:#0f141a; border:1px solid var(--border); border-radius:6px; height:16px; overflow:hidden; position:relative; }
    .fill { height:100%; background:var(--accent); border-radius:5px 0 0 5px; }
    .fill.good { background:var(--green); }
    .fill.neg { background:var(--red); }
    .fill.dim { background:#3a4553; }
    .best { color:var(--green); font-weight:600; }
    .center0 { position:relative; }
    .center0 .mid { position:absolute; left:50%; top:0; bottom:0; width:1px; background:var(--border); }
    .fill.signed { position:absolute; top:0; height:100%; }
    .hint { background:#0f141a; border-left:3px solid var(--accent); padding:8px 12px; border-radius:6px; margin:6px 0; font-size:14px; }
    .empty { color:var(--muted); font-style:italic; }
    h3 .sub { font-size:12px; color:var(--muted); font-weight:400; margin-left:8px; }
  </style>
</head>
<body>
  <header>
    <h1>🛰 trend-engine</h1>
    <span class="niche">{{ niche or "" }}</span>
    <nav>
      <a href="/">Queue</a>
      <a href="/insights">Insights</a>
      <a href="/feedback">Performance</a>
      <form method="post" action="/killswitch/toggle" style="margin:0">
        <button class="{{ 'bad' if kill_active else 'warn' }}">
          {{ '● Kill switch ON — resume' if kill_active else 'Kill switch' }}
        </button>
      </form>
    </nav>
  </header>
  <div class="wrap">
    {% block body %}{% endblock %}
  </div>
</body>
</html>
